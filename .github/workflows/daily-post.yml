name: Daily Blog Post

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (UTC 00:00)
  workflow_dispatch:
    inputs:
      no_publish:
        description: '발행 없이 리서치/작성만 (dry-run)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force_angle_refresh:
        description: '앵글 강제 갱신 (--force)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  post:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          if [ "${{ github.event.inputs.force_angle_refresh }}" = "true" ]; then
            python3 -m agents.angle_refresher --force
          fi

          if [ "${{ github.event.inputs.no_publish }}" = "true" ]; then
            python3 run_daily.py --no-publish
          else
            python3 run_daily.py
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: output/logs/
          retention-days: 7
